name: Build iOS (Unsigned IPA)

on: workflow_dispatch

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          cd ios && pod install && cd ..

      - name: Build unsigned IPA
        run: flutter build ios --no-codesign --release

      - name: Package IPA
        run: |
          mkdir -p build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ../../GigsCourt.ipa Payload/
          cd ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GigsCourt-iOS-Unsigned
          path: build/GigsCourt.ipa
